name: Docs issue
description: Report inaccurate or unclear public integration docs
title: "[docs] "
labels: ["docs"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which file or page is wrong?
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Suggested fix
      description: What should it say instead?

