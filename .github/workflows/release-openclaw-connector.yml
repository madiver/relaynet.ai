name: Release OpenClaw Connector

on:
  workflow_dispatch:
  push:
    tags:
      - "openclaw-connector-v*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Pack connector
        run: npm pack ./connectors/openclaw
      - name: Write checksum
        run: node ./scripts/write-openclaw-checksum.mjs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-connector-release
          path: |
            *.tgz
            *.sha256
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            *.sha256
